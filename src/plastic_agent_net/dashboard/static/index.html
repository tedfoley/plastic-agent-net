<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlasticAgentNet Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <header>
        <h1>PlasticAgentNet</h1>
        <div id="status-bar">
            <span id="status-indicator" class="status idle">idle</span>
            <span id="round-counter">Round: —</span>
            <span id="token-counter">Tokens: —</span>
            <span id="node-counter">Nodes: —</span>
        </div>
    </header>

    <main>
        <section id="graph-panel">
            <h2>Agent Graph</h2>
            <svg id="graph-svg" width="100%" height="500"></svg>
        </section>

        <section id="details-panel">
            <div id="artifacts-panel">
                <h2>Artifacts</h2>
                <div id="artifact-list"></div>
            </div>

            <div id="log-panel">
                <h2>Live Log</h2>
                <div id="log-stream"></div>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
